<!DOCTYPE html>
<html>
<head>
<title>Buyer Register</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>🛒 Buyer Register</h2>

<input id="name" placeholder="Name"><br>
<input id="phone" placeholder="Phone"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="registerBuyer()">Register</button>

<p>
Already have account? <a href="buyer.html">Login</a>
</p>

<script>

function registerBuyer(){

    let name = document.getElementById("name").value.trim();
    let phone = document.getElementById("phone").value.trim();
    let password = document.getElementById("password").value.trim();

    // ❌ EMPTY CHECK
    if(name === "" || phone === "" || password === ""){
        alert("⚠ Please fill all fields!");
        return;
    }

    let buyers = JSON.parse(localStorage.getItem("buyers")) || [];

    // ❌ DUPLICATE CHECK
    let exists = buyers.find(b => b.phone === phone);

    if(exists){
        alert("Buyer already registered!");
        return;
    }

    // ✅ SAVE BUYER
    buyers.push({
        name,
        phone,
        password
    });

    localStorage.setItem("buyers", JSON.stringify(buyers));

    alert(" Registration Successful!");
    window.location.href = "buyer.html";
}

</script>

</body>
</html>
